name: Deploy Homologacao

on:
  workflow_run:
    workflows: ["CI", "Integration DB"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_sha:
        description: "Commit SHA para deploy (opcional)"
        required: false
        type: string

jobs:
  deploy-hml:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment:
      name: homologacao
      url: ${{ vars.HML_APP_URL }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Deploy homologacao
        env:
          DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND_HML }}
        run: bash ./scripts/ops/deploy.sh

      - name: Smoke check homologacao
        env:
          BASE_URL: ${{ vars.HML_APP_URL }}
        run: bash ./scripts/ops/smoke-check.sh
